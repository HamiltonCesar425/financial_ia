version: "3.9"

services:
  app:
    build: .
    container_name: financial_ai_app
    
    ports:
      - "8000:8000"
    
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:latest
    container_name: financial_ai_prometheus
    
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: financial_ai_grafana
    
    ports:
      - "3000:3000"
    networks:
      - monitoring
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin


networks:
  monitoring:
    driver: bridge
  