version: "3.9"

services:
  api:
    build: .
    container_name: financial_ia_api
    ports:
      - "8000:8000"
    depends_on:
      - prometheus
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus
    container_name: financial_ia_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - monitoring

  grafana:
    image: grafana/grafana
    container_name: financial_ia_grafana
    ports:
      - "3000:3000"
    networks:
      - monitoring

networks:
  monitoring:
  