

services:

  prometheus:
    image: prom/prometheus
    container_name: financial_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    container_name: financial_grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus